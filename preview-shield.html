<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shield Variations Preview</title>
  <style>
    body {
      margin: 20px;
      font-family: monospace;
      background: #1a1a1a;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .variant {
      border: 2px solid #333;
      padding: 15px;
      background: #2a2a2a;
      border-radius: 8px;
    }
    .variant h3 {
      margin: 0 0 10px 0;
      color: #4af;
    }
    .preview {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .preview-box {
      flex: 1;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #444;
      border-radius: 4px;
    }
    .dark { background: #000; }
    .light { background: #fff; }
    .preview-box img {
      max-width: 128px;
      max-height: 128px;
      image-rendering: pixelated;
    }
    .info {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Shield Bubble Variations</h1>
  <p>Generated from 5 different prompts. Select the best one for Space Laser.</p>

  <div class="grid">
    <div class="variant">
      <h3>Variation 1</h3>
      <div class="preview">
        <div class="preview-box dark">
          <img src="output/shield_variation_1.png" alt="Variation 1 on dark">
        </div>
        <div class="preview-box light">
          <img src="output/shield_variation_1.png" alt="Variation 1 on light">
        </div>
      </div>
      <div class="info" id="info1">Loading...</div>
    </div>

    <div class="variant">
      <h3>Variation 2</h3>
      <div class="preview">
        <div class="preview-box dark">
          <img src="output/shield_variation_2.png" alt="Variation 2 on dark">
        </div>
        <div class="preview-box light">
          <img src="output/shield_variation_2.png" alt="Variation 2 on light">
        </div>
      </div>
      <div class="info" id="info2">Loading...</div>
    </div>

    <div class="variant">
      <h3>Variation 3</h3>
      <div class="preview">
        <div class="preview-box dark">
          <img src="output/shield_variation_3.png" alt="Variation 3 on dark">
        </div>
        <div class="preview-box light">
          <img src="output/shield_variation_3.png" alt="Variation 3 on light">
        </div>
      </div>
      <div class="info" id="info3">Loading...</div>
    </div>

    <div class="variant">
      <h3>Variation 4</h3>
      <div class="preview">
        <div class="preview-box dark">
          <img src="output/shield_variation_4.png" alt="Variation 4 on dark">
        </div>
        <div class="preview-box light">
          <img src="output/shield_variation_4.png" alt="Variation 4 on light">
        </div>
      </div>
      <div class="info" id="info4">Loading...</div>
    </div>

    <div class="variant">
      <h3>Variation 5</h3>
      <div class="preview">
        <div class="preview-box dark">
          <img src="output/shield_variation_5.png" alt="Variation 5 on dark">
        </div>
        <div class="preview-box light">
          <img src="output/shield_variation_5.png" alt="Variation 5 on light">
        </div>
      </div>
      <div class="info" id="info5">Loading...</div>
    </div>
  </div>

  <script>
    async function loadImageInfo(src, infoId) {
      try {
        const response = await fetch(src);
        const blob = await response.blob();
        const sizeKB = (blob.size / 1024).toFixed(2);

        const img = new Image();
        img.src = URL.createObjectURL(blob);
        await img.decode();

        document.getElementById(infoId).textContent =
          `${img.width}x${img.height} | ${sizeKB} KB`;
      } catch (err) {
        document.getElementById(infoId).textContent = 'Error loading';
      }
    }

    for (let i = 1; i <= 5; i++) {
      loadImageInfo(`output/shield_variation_${i}.png`, `info${i}`);
    }
  </script>
</body>
</html>
