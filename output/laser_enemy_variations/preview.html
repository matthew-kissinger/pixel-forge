<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enemy Laser Variations</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #ff6b9d;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .variation {
      background: #16213e;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 2px solid #0f3460;
    }
    .variation h2 {
      margin-top: 0;
      color: #ff6b9d;
    }
    .preview {
      background: #000;
      padding: 20px;
      border-radius: 4px;
      margin: 10px 0;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview img {
      image-rendering: pixelated;
      max-width: 100%;
      height: auto;
    }
    .info {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Enemy Laser Projectile - Variations</h1>
    <div class="grid">
      <div class="variation">
        <h2>Variation 1</h2>
        <p>Smooth gradient</p>
        <div class="preview">
          <img src="laser_enemy_v1.png" alt="Variation 1">
        </div>
        <div class="info">laser_enemy_v1.png</div>
      </div>

      <div class="variation">
        <h2>Variation 2</h2>
        <p>Pulsing energy core</p>
        <div class="preview">
          <img src="laser_enemy_v2.png" alt="Variation 2">
        </div>
        <div class="info">laser_enemy_v2.png</div>
      </div>

      <div class="variation">
        <h2>Variation 3</h2>
        <p>Trailing particles</p>
        <div class="preview">
          <img src="laser_enemy_v3.png" alt="Variation 3">
        </div>
        <div class="info">laser_enemy_v3.png</div>
      </div>

      <div class="variation">
        <h2>Variation 4</h2>
        <p>Spiral pattern</p>
        <div class="preview">
          <img src="laser_enemy_v4.png" alt="Variation 4">
        </div>
        <div class="info">laser_enemy_v4.png</div>
      </div>

      <div class="variation">
        <h2>Variation 5</h2>
        <p>Sharp angular design</p>
        <div class="preview">
          <img src="laser_enemy_v5.png" alt="Variation 5">
        </div>
        <div class="info">laser_enemy_v5.png</div>
      </div>
    </div>
  </div>
</body>
</html>
